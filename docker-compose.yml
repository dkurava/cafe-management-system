services:

  # ════════════════════════════════
  # SPRING BOOT APP
  # ════════════════════════════════
  cafe-app:
    build: .
    container_name: cafe-app
    ports:
      - "8080:8081"
    environment:
      # ── DATABASE ──
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/cafedb
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      # ── DISABLE VAULT ──
      - SPRING_CLOUD_VAULT_ENABLED=false
      - SPRING_CLOUD_VAULT_CONFIG_ENABLED=false
      - SPRING_CLOUD_BOOTSTRAP_ENABLED=false
      - SPRING_CONFIG_IMPORT=optional:file:./
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false
      # ── JWT ──
      - jwt-secret=minicoy-cafe-super-secret-key-2024-very-long
      - jwt-expiration=86400000
      # ── DB CREDENTIALS ──
      - db-username=${DB_USERNAME}
      - db-password=${DB_PASSWORD}
      # ── CREATE TABLES AUTOMATICALLY! ──
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cafe-network
    restart: on-failure

  # ════════════════════════════════
  # MYSQL DATABASE
  # ════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: cafe-mysql
    ports:
      - "3307:3306"
    environment:
      - SERVER_PORT=8080
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=cafedb
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - cafe-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping",
             "-h", "localhost",
             "-u", "root",
             "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ════════════════════════════════
# VOLUMES
# data survives container restart!
# ════════════════════════════════
volumes:
  mysql-data:

# ════════════════════════════════
# NETWORKS
# ════════════════════════════════
networks:
  cafe-network:
    driver: bridge