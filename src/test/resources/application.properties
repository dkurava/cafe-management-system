# Test configuration
# Uses H2 instead of MySQL!
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Skip Vault for tests!
spring.cloud.vault.enabled=false
spring.cloud.vault.config.enabled=false
spring.cloud.bootstrap.enabled=false
spring.config.import=

# JWT direct values for tests!
jwt.secret=test-secret-key-for-testing-only-minimum-32-characters-long
jwt.expiration=86400000

#skip actuator for tests
management.endpoints.web.exposure.include=health

spring.cloud.compatibility-verifier.enabled=false